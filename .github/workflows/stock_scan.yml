name: Stock Strategy Daily Scan

on:
  schedule:
    # 台灣時間 19:00 (UTC 11:00)
    - cron: '0 11 * * 1-5'  
  workflow_dispatch: 

jobs:
  daily_scan:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 檢查並下載程式碼
      uses: actions/checkout@v4

    - name: 2. 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        # 暫時移除 cache: 'pip'，確保環境是乾淨重裝的

    - name: 3. 安裝必要套件
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then 
          python -m pip install -r requirements.txt
        else 
          python -m pip install pandas numpy scikit-learn yfinance rich FinMind requests tqdm twstock
        fi
        # 確保偵錯指令能執行
        python -c "import tqdm; print('tqdm version:', tqdm.__version__)"

    - name: 4. 執行盤後策略掃描 (自動輸入 1)
      env:
        TZ: Asia/Taipei
      run: |
        echo "--- 正在啟動 19:00 自動掃描 ---"
        # 使用 -u 確保輸出即時顯示在 GitHub Log
        echo 1 | python -u STOCK_GOD.py 
        echo "--- 掃描執行完畢 ---"

    - name: 5. 儲存日誌與監控清單回 GitHub
      if: always()  # 🛡️ 終極保險：不管前面的步驟是成功還是紅燈報錯，這一步都強制執行！
      run: |
        # 設定 Git 機器人身分
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        
        # 把變更的檔案加入暫存區
        git add long_term_watchlist.json
        git add line_push_log.txt
        
        # 檢查是否有檔案真的被修改
        if git diff --staged --quiet; then
          echo "檔案沒有變動，無需提交。"
        else
          git commit -m "Auto-update: 同步監控清單與 LINE 推播日誌"
          git push
        fi