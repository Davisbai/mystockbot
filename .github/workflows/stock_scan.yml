name: Stock Strategy Daily Scan

on:
  schedule:
    # 台灣時間 19:00 等於 UTC 時間 11:00 (19:00 - 8 = 11:00)
    - cron: '0 11 * * *'  # 每天 19:00 執行
  workflow_dispatch:        # 允許手動執行

jobs:
  daily_scan:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 檢查並下載程式碼
      uses: actions/checkout@v4

    - name: 2. 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 3. 安裝必要套件
      run: |
        python -m pip install --upgrade pip
        # 確保讀取專案根目錄的 requirements.txt
        if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install pandas numpy scikit-learn yfinance rich FinMind requests; fi

    - name: 4. 執行盤後策略掃描 (自動輸入 1)
      env:
        TZ: Asia/Taipei
      run: |
        echo "--- 正在啟動 19:00 自動掃描 (自動選取模式 1) ---"
        echo 1 | python STOCK_GOD.py
        echo "--- 掃描執行完畢 ---"
