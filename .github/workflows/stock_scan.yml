name: Stock Strategy Daily Scan

on:
  schedule:
    # 台灣時間 19:00
    - cron: '0 11 * * 1-5'  
  workflow_dispatch: 

jobs:
  daily_scan:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 檢查並下載程式碼
      uses: actions/checkout@v4

    - name: 2. 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        # 暫時移除 cache: 'pip'，確保環境是乾淨重裝的

    - name: 3. 安裝必要套件
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then 
          python -m pip install -r requirements.txt
        else 
          python -m pip install pandas numpy scikit-learn yfinance rich FinMind requests tqdm twstock
        fi
        # 修正縮進，確保偵錯指令能執行
        python -c "import tqdm; print('tqdm version:', tqdm.__version__)"

    - name: 4. 執行盤後策略掃描 (自動輸入 1)
      env:
        TZ: Asia/Taipei
      run: |
        echo "--- 正在啟動 19:00 自動掃描 ---"
        # 使用 -u 確保輸出即時顯示在 GitHub Log
        echo 1 | python -u STOCK_GOD.py 
        echo "--- 掃描執行完畢 ---"