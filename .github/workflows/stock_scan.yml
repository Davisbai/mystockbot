name: Stock Strategy Daily Scan

on:
  schedule:
    # 台灣時間 19:00 等於 UTC 時間 11:00 (19:00 - 8 = 11:00)
    # 1-5 代表只在星期一到星期五執行 (排除週末)
    - cron: '0 11 * * 1-5'  
  workflow_dispatch:        # 允許手動執行

jobs:
  daily_scan:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 檢查並下載程式碼
      uses: actions/checkout@v4

    - name: 2. 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 3. 安裝必要套件
      run: |
        # 使用 -m pip 確保安裝路徑一致
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then 
          python -m pip install -r requirements.txt
        else 
          python -m pip install pandas numpy scikit-learn yfinance rich FinMind requests tqdm twstock
        fi

    - name: 4. 執行盤後策略掃描 (自動輸入 1)
      env:
        TZ: Asia/Taipei
      run: |
        echo "--- 正在啟動 19:00 自動掃描 ---"
        # 同樣使用 python -m 執行，確保環境一致
        echo 1 | python -u STOCK_GOD.py 
        echo "--- 掃描執行完畢 ---"
