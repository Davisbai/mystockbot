name: Stock Strategy Daily Scan

on:
  schedule:
    # 台灣時間 00:10 等於 UTC 前一天的 16:10 (00:10 - 8小時 = 16:10)
    - cron: '10 16 * * *'  # 每天凌晨 00:10 執行
  workflow_dispatch:        # 允許手動執行

jobs:
  daily_scan:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 檢查並下載程式碼
      uses: actions/checkout@v4

    - name: 2. 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 3. 安裝必要套件
      run: |
        python -m pip install --upgrade pip
        # 確保讀取你的 requirements.txt
        pip install -r requirements.txt

    - name: 4. 執行盤後策略掃描 (自動輸入 1)
      env:
        TZ: Asia/Taipei
      run: |
        echo "--- 正在啟動 00:10 自動掃描 (自動選取模式 1) ---"
        echo 1 | python STOCK_GOD.py
        echo "--- 掃描執行完畢 ---"
